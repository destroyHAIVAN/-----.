<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Наш сайт</title>
    <style>
    body { font-family: "Inter", sans-serif; background: #d7f6f6; display: flex; flex-direction: column; align-items: center; padding: 20px; }
    .container { width: 100%; max-width: 500px; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 0 10px rgba(0,0,0,0.1); margin-bottom: 20px; }
    input { width: 100%; padding: 15px; margin: 10px 0; border: 1px solid #ddd; border-radius: 12px; box-sizing: border-box; }
    button { background: #007bff; color: white; border: none; padding: 12px; border-radius: 12px; width: 100%; font-weight: 600; cursor: pointer; transition: 0.3s ease-in-out; }
    button:hover { background: #0056b3; }
    button:disabled { background: #ccc; cursor: not-allowed; }
    .post { background: #fff9f9; padding: 15px; margin-top: 15px; border-radius: 12px; width: 100%; max-width: 500px; box-sizing: border-box; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
    .like-btn { cursor: pointer; border: none; background: #ff9999; padding: 8px 15px; margin-top: 10px; border-radius: 12px; font-size: 14px; transition: 0.2s ease-in-out; width: auto; }
    .like-btn:hover { background: #ff6666; }
    .time { font-size: 12px; color: #666; display: block; margin-bottom: 8px; }
    </style>
</head>
<body>
    <div class="container">
        <input type="text" id="name" placeholder="Ваше имя">
        <input type="email" id="email" placeholder="Email">
        <button id="mainBtn">Отправить</button>
    </div>
    <div id="feed"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import {
            getFirestore, collection, addDoc, query, orderBy, onSnapshot,
            serverTimestamp, updateDoc, doc, increment
        } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDgUxR0Txafc_qA-rpd5zKn33265IfxclW",
            authDomain: "qazaq-a072e.firebaseapp.com",
            projectId: "qazaq-a072e",
            storageBucket: "qazaq-a072e.firebasestorage.app",
            messagingSenderId: "47025480090",
            appId: "1:47025480090:web:3dd74ff29bc0c149f39a23",
            measurementId: "G-9TE97NMMB9"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.processLike = async (id) => {
            const docRef = doc(db, "requests", id);
            try {
                await updateDoc(docRef, { likes: increment(1) });
            } catch (error) {
                console.error("Ошибка при обновлении лайков:", error);
            }
        };

        document.getElementById("mainBtn").onclick = async () => {
            const btn = document.getElementById("mainBtn");
            const nameInput = document.getElementById("name");
            const emailInput = document.getElementById("email");
            
            if (!nameInput.value.trim() || !emailInput.value.trim()) {
                alert("Пожалуйста, заполните все поля");
                return;
            }
            
            btn.disabled = true;
            try {
                await addDoc(collection(db, "requests"), {
                    name: nameInput.value,
                    email: emailInput.value,
                    likes: 0,
                    timestamp: serverTimestamp()
                });
                nameInput.value = "";
                emailInput.value = "";
            } catch (e) { 
                console.error("Ошибка при добавлении:", e);
                alert("Ошибка безопасности: Данные отклонены сервером."); 
            }
            btn.disabled = false;
        };

        const q = query(collection(db, "requests"), orderBy("timestamp", "desc"));
        onSnapshot(q, (snapshot) => {
            const feed = document.getElementById("feed");
            feed.innerHTML = "";
            snapshot.forEach((doc) => {
                const data = doc.data();
                const timestamp = data.timestamp ? data.timestamp.toDate().toLocaleString() : "Только что";
                const likes = data.likes || 0;
                const name = data.name || "";
                const email = data.email || "";
                
                const postDiv = document.createElement("div");
                postDiv.className = "post";
                postDiv.innerHTML = `
                    <span class="time">🕒 ${timestamp}</span>
                    <b>${escapeHtml(name)}</b>
                    <p style="margin: 5px 0;">${escapeHtml(email)}</p>
                    <button class="like-btn" onclick="processLike('${doc.id}')">
                        ❤️ ${likes} лайков
                    </button>
                `;
                feed.appendChild(postDiv);
            });
        });
        
        function escapeHtml(str) {
            if (!str) return "";
            return str
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }
    </script>
</body>
</html>
