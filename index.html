<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Braces DM · Private Messenger</title>
  <!-- Google Fonts & simple reset -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: #f0f2f5;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    /* main app container */
    .app-container {
      width: 100%;
      max-width: 1400px;
      height: 95vh;
      background: white;
      border-radius: 28px;
      box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.2);
      display: flex;
      overflow: hidden;
      transition: all 0.2s ease;
    }

    /* SIDEBAR (users list) */
    .sidebar {
      width: 320px;
      background: #ffffff;
      border-right: 1px solid #eef2f6;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      flex-shrink: 0;
    }

    .user-profile {
      padding: 20px 18px;
      border-bottom: 1px solid #edf2f7;
      background: #fafcff;
    }

    .profile-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .avatar {
      width: 48px;
      height: 48px;
      border-radius: 32px;
      object-fit: cover;
      border: 2px solid #e2e8f0;
      background: #eef2ff;
    }

    .user-info h4 {
      font-size: 1rem;
      font-weight: 600;
      color: #0f172a;
    }

    .user-info p {
      font-size: 0.75rem;
      color: #5b6e8c;
      margin-top: 4px;
    }

    .signout-btn {
      margin-left: auto;
      background: none;
      border: none;
      font-size: 1.25rem;
      cursor: pointer;
      color: #94a3b8;
      transition: 0.2s;
      padding: 6px;
      border-radius: 40px;
    }

    .signout-btn:hover {
      background: #fee2e2;
      color: #dc2626;
    }

    .users-header {
      padding: 18px 18px 8px 18px;
      font-weight: 600;
      font-size: 0.85rem;
      letter-spacing: 0.5px;
      color: #3b4a62;
      text-transform: uppercase;
      background: white;
    }

    .users-list {
      flex: 1;
      overflow-y: auto;
      padding: 0 8px 16px 8px;
    }

    .user-card {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 14px;
      margin: 4px 0;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.2s;
      background: #ffffff;
    }

    .user-card:hover {
      background: #f1f5f9;
    }

    .user-card.active {
      background: #eef2ff;
      border-left: 4px solid #3b82f6;
    }

    .user-avatar-small {
      width: 44px;
      height: 44px;
      border-radius: 44px;
      object-fit: cover;
      background: #e2e8f0;
    }

    .user-details {
      flex: 1;
    }

    .user-details .name {
      font-weight: 600;
      color: #1e293b;
    }

    .user-details .email {
      font-size: 0.7rem;
      color: #6c7f9e;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* CHAT AREA */
    .chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #f8fafc;
      overflow: hidden;
    }

    .chat-header {
      padding: 18px 24px;
      background: white;
      border-bottom: 1px solid #eef2f6;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .chat-header img {
      width: 44px;
      height: 44px;
      border-radius: 44px;
      object-fit: cover;
    }

    .chat-header h3 {
      font-size: 1.2rem;
      font-weight: 600;
      color: #0f172a;
    }

    .chat-header p {
      font-size: 0.75rem;
      color: #4b6b8f;
    }

    .messages-container {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      background: #f8fafc;
    }

    .message-bubble {
      max-width: 70%;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .message-outgoing {
      align-self: flex-end;
      align-items: flex-end;
    }

    .message-incoming {
      align-self: flex-start;
    }

    .bubble {
      padding: 12px 18px;
      border-radius: 24px;
      font-size: 0.95rem;
      line-height: 1.4;
      word-break: break-word;
      box-shadow: 0 1px 1px rgba(0,0,0,0.05);
    }

    .message-outgoing .bubble {
      background: #3b82f6;
      color: white;
      border-bottom-right-radius: 6px;
    }

    .message-incoming .bubble {
      background: white;
      border: 1px solid #e2e8f0;
      color: #1e293b;
      border-bottom-left-radius: 6px;
    }

    .message-time {
      font-size: 0.7rem;
      color: #7f8ea3;
      margin-top: 4px;
      margin-inline: 6px;
    }

    .chat-input-area {
      background: white;
      padding: 16px 20px;
      border-top: 1px solid #edf2f7;
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .chat-input-area input {
      flex: 1;
      padding: 14px 18px;
      border: 1px solid #e2e8f0;
      border-radius: 40px;
      font-size: 0.95rem;
      outline: none;
      transition: 0.2s;
      font-family: inherit;
    }

    .chat-input-area input:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59,130,246,0.2);
    }

    .chat-input-area button {
      background: #3b82f6;
      border: none;
      color: white;
      padding: 12px 24px;
      border-radius: 40px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
      font-family: inherit;
    }

    .chat-input-area button:hover {
      background: #2563eb;
    }

    .empty-state {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #8b9ab0;
      font-weight: 500;
      text-align: center;
      flex-direction: column;
      gap: 12px;
    }

    .login-panel {
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #f0f4f9;
    }

    .login-card {
      background: white;
      border-radius: 36px;
      padding: 48px 32px;
      text-align: center;
      max-width: 420px;
      box-shadow: 0 20px 35px -12px rgba(0,0,0,0.1);
    }

    .google-btn {
      background: #ffffff;
      border: 1px solid #d0d9e8;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 12px 24px;
      font-size: 1rem;
      font-weight: 500;
      border-radius: 60px;
      margin-top: 28px;
      cursor: pointer;
      transition: all 0.2s;
      width: 100%;
    }

    .google-btn:hover {
      background: #f8fafc;
      border-color: #3b82f6;
    }

    .loading-spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2px solid #e2e8f0;
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @media (max-width: 700px) {
      .sidebar { width: 260px; }
      .message-bubble { max-width: 85%; }
    }
  </style>
</head>
<body>
<div id="app-root" class="app-container"></div>

<!-- Import Firebase SDKs (modular) -->
<script type="importmap">
  {
    "imports": {
      "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
      "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js",
      "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js",
      "firebase/analytics": "https://www.gstatic.com/firebasejs/10.8.0/firebase-analytics.js"
    }
  }
</script>

<script type="module">
  import { initializeApp } from "firebase/app";
  import { getAnalytics } from "firebase/analytics";
  import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "firebase/auth";
  import { getFirestore, collection, doc, setDoc, getDocs, query, where, orderBy, addDoc, onSnapshot, serverTimestamp, updateDoc, deleteField } from "firebase/firestore";

  // ---------- FIREBASE CONFIG (provided by user) ----------
  const firebaseConfig = {
    const firebaseConfig = {
  apiKey: "AIzaSyAWuh8c6B8A6sZToM7BhvH9Llr-JPtBSWM",          // ← замените на правильный
  authDomain: "braces-3b27a.firebaseapp.com",
  projectId: "braces-3b27a",
  storageBucket: "braces-3b27a.firebasestorage.app",
  messagingSenderId: "89144591989",
  appId: "1:89144591989:web:e3f02adb8b3cdb3c0dda3c",
  measurementId: "G-1ZSFNF22DG"
};
  };

  // Initialize Firebase
  const app = initializeApp(firebaseConfig);
  const analytics = getAnalytics(app);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const googleProvider = new GoogleAuthProvider();

  // ---------- DOM references & state ----------
  let rootEl = document.getElementById("app-root");
  let currentUser = null;           // firebase user object
  let currentChatPartner = null;    // { uid, displayName, photoURL, email }
  let messagesUnsubscribe = null;    // function to detach messages listener
  let usersUnsubscribe = null;       // function to detach users listener
  
  // Helper: generate deterministic chatId (sorted uids)
  function getChatId(uid1, uid2) {
    return uid1 < uid2 ? `${uid1}_${uid2}` : `${uid2}_${uid1}`;
  }

  // Save / update user profile to Firestore "users" collection
  async function registerUserInFirestore(user) {
    if (!user) return;
    const userRef = doc(db, "users", user.uid);
    const userData = {
      uid: user.uid,
      displayName: user.displayName || "Anonymous",
      email: user.email,
      photoURL: user.photoURL || "https://ui-avatars.com/api/?background=3b82f6&color=fff&bold=true&size=64&name=" + encodeURIComponent(user.displayName || "U"),
      updatedAt: serverTimestamp(),
      createdAt: serverTimestamp()
    };
    await setDoc(userRef, userData, { merge: true });
  }

  // Render login screen
  function renderLogin() {
    rootEl.innerHTML = `
      <div class="login-panel">
        <div class="login-card">
          <span style="font-size: 48px;">💬</span>
          <h2 style="margin-top: 16px; font-weight: 600;">Braces Messenger</h2>
          <p style="color: #4b5e77; margin-top: 8px;">Private & encrypted DMs</p>
          <button id="google-signin-btn" class="google-btn">
            <svg width="22" height="22" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
            Sign in with Google
          </button>
        </div>
      </div>
    `;
    document.getElementById("google-signin-btn")?.addEventListener("click", async () => {
      try {
        const result = await signInWithPopup(auth, googleProvider);
        await registerUserInFirestore(result.user);
        // UI will re-render via onAuthStateChanged
      } catch (err) {
        console.error("Google sign-in error", err);
        alert("Ошибка входа: " + err.message);
      }
    });
  }

  // Render main messenger interface (sidebar + chat)
  function renderMessengerUI() {
    if (!currentUser) return;
    rootEl.innerHTML = `
      <div class="app-container">
        <div class="sidebar">
          <div class="user-profile">
            <div class="profile-row">
              <img class="avatar" src="${currentUser.photoURL || 'https://ui-avatars.com/api/?background=3b82f6&color=fff'}" alt="avatar">
              <div class="user-info">
                <h4>${escapeHtml(currentUser.displayName || 'User')}</h4>
                <p>${escapeHtml(currentUser.email || '')}</p>
              </div>
              <button id="signout-button" class="signout-btn" title="Sign out">🚪</button>
            </div>
          </div>
          <div class="users-header">📬 All members · Direct messages</div>
          <div id="users-list-container" class="users-list">
            <div style="padding:20px; text-align:center;"><div class="loading-spinner"></div> Loading users...</div>
          </div>
        </div>
        <div class="chat-area">
          <div id="chat-header-area" class="chat-header">
            <div class="empty-state" style="width:100%;">✨ Select a contact to start messaging</div>
          </div>
          <div id="messages-container" class="messages-container">
            <div class="empty-state">💬 No conversation selected</div>
          </div>
          <div id="input-area" class="chat-input-area" style="display: none;">
            <input type="text" id="message-input" placeholder="Type a message..." autocomplete="off">
            <button id="send-btn">Send</button>
          </div>
        </div>
      </div>
    `;

    // sign out
    document.getElementById("signout-button")?.addEventListener("click", async () => {
      await signOut(auth);
      if (messagesUnsubscribe) messagesUnsubscribe();
      if (usersUnsubscribe) usersUnsubscribe();
      currentChatPartner = null;
    });

    // Load dynamic users list with realtime updates
    loadUsersListRealtime();

    // If a chat partner was previously selected (after rerender?), attach listeners again
    if (currentChatPartner) {
      activateChatWithPartner(currentChatPartner);
    } else {
      // reset chat area to placeholder
      document.getElementById("chat-header-area").innerHTML = `<div class="empty-state" style="width:100%;">👋 Pick someone to chat</div>`;
      const msgContainer = document.getElementById("messages-container");
      if (msgContainer) msgContainer.innerHTML = `<div class="empty-state">💬 Select user to see messages</div>`;
      const inputDiv = document.getElementById("input-area");
      if (inputDiv) inputDiv.style.display = "none";
    }
  }

  // Real-time listener for all users (except current)
  function loadUsersListRealtime() {
    if (usersUnsubscribe) usersUnsubscribe();
    const usersRef = collection(db, "users");
    const q = query(usersRef);
    usersUnsubscribe = onSnapshot(q, (snapshot) => {
      const usersList = [];
      snapshot.forEach(docSnap => {
        const userData = docSnap.data();
        if (userData.uid !== currentUser.uid) {
          usersList.push({
            uid: userData.uid,
            displayName: userData.displayName || "No name",
            email: userData.email || "",
            photoURL: userData.photoURL || "https://ui-avatars.com/api/?background=64748b&color=fff"
          });
        }
      });
      renderUsersSidebar(usersList);
    }, (err) => {
      console.error("Users listener error:", err);
      const container = document.getElementById("users-list-container");
      if (container) container.innerHTML = `<div style="padding:20px; color:red;">Error loading users</div>`;
    });
  }

  function renderUsersSidebar(users) {
    const container = document.getElementById("users-list-container");
    if (!container) return;
    if (users.length === 0) {
      container.innerHTML = `<div style="padding:20px; text-align:center; color:#6b7c9e;">No other users yet 🙈</div>`;
      return;
    }
    container.innerHTML = users.map(user => `
      <div class="user-card" data-uid="${user.uid}" data-name="${escapeHtml(user.displayName)}" data-photo="${user.photoURL}" data-email="${escapeHtml(user.email)}">
        <img class="user-avatar-small" src="${user.photoURL}" alt="avatar">
        <div class="user-details">
          <div class="name">${escapeHtml(user.displayName)}</div>
          <div class="email">${escapeHtml(user.email)}</div>
        </div>
      </div>
    `).join('');
    // add click listeners
    document.querySelectorAll('.user-card').forEach(card => {
      card.addEventListener('click', () => {
        const partner = {
          uid: card.dataset.uid,
          displayName: card.dataset.name,
          photoURL: card.dataset.photo,
          email: card.dataset.email
        };
        currentChatPartner = partner;
        activateChatWithPartner(partner);
        // highlight active user in sidebar
        document.querySelectorAll('.user-card').forEach(el => el.classList.remove('active'));
        card.classList.add('active');
      });
    });
  }

  // load messages for selected partner + setup realtime listener
  function activateChatWithPartner(partner) {
    if (!currentUser || !partner) return;
    // update chat header
    const chatHeader = document.getElementById("chat-header-area");
    if (chatHeader) {
      chatHeader.innerHTML = `
        <img src="${partner.photoURL}" alt="avatar">
        <div>
          <h3>${escapeHtml(partner.displayName)}</h3>
          <p>${escapeHtml(partner.email)}</p>
        </div>
      `;
    }
    // show input area
    const inputDiv = document.getElementById("input-area");
    if (inputDiv) inputDiv.style.display = "flex";
    
    // setup realtime messages
    if (messagesUnsubscribe) messagesUnsubscribe();
    const chatId = getChatId(currentUser.uid, partner.uid);
    const messagesRef = collection(db, "messages");
    const qMessages = query(
      messagesRef,
      where("chatId", "==", chatId),
      orderBy("timestamp", "asc")
    );
    
    messagesUnsubscribe = onSnapshot(qMessages, (snapshot) => {
      const messagesList = [];
      snapshot.forEach(docSnap => {
        messagesList.push({ id: docSnap.id, ...docSnap.data() });
      });
      renderMessages(messagesList, partner);
    }, (error) => {
      console.error("Messages listener error:", error);
    });
    
    // send message logic
    const sendBtn = document.getElementById("send-btn");
    const msgInput = document.getElementById("message-input");
    const sendMessageFunc = async () => {
      const text = msgInput.value.trim();
      if (!text) return;
      try {
        await addDoc(collection(db, "messages"), {
          from: currentUser.uid,
          to: partner.uid,
          text: text,
          chatId: chatId,
          timestamp: serverTimestamp()
        });
        msgInput.value = "";
        msgInput.focus();
      } catch (err) {
        console.error("send error:", err);
        alert("Failed to send: " + err.message);
      }
    };
    if (sendBtn) {
      const newSendBtn = sendBtn.cloneNode(true);
      sendBtn.parentNode.replaceChild(newSendBtn, sendBtn);
      newSendBtn.addEventListener("click", sendMessageFunc);
    }
    if (msgInput) {
      msgInput.removeEventListener("keypress", window._msgKeyHandler);
      const keyHandler = (e) => { if (e.key === "Enter") sendMessageFunc(); };
      msgInput.addEventListener("keypress", keyHandler);
      window._msgKeyHandler = keyHandler;
      msgInput.focus();
    }
  }

  function renderMessages(messages, partner) {
    const container = document.getElementById("messages-container");
    if (!container) return;
    if (messages.length === 0) {
      container.innerHTML = `<div class="empty-state">💬 No messages yet. Say hello! 👋</div>`;
      return;
    }
    container.innerHTML = messages.map(msg => {
      const isOwn = msg.from === currentUser.uid;
      const senderName = isOwn ? "You" : partner.displayName;
      const time = msg.timestamp ? new Date(msg.timestamp.toDate()).toLocaleTimeString([], { hour: '2-digit', minute:'2-digit' }) : "Just now";
      return `
        <div class="message-bubble ${isOwn ? 'message-outgoing' : 'message-incoming'}">
          <div class="bubble">${escapeHtml(msg.text)}</div>
          <div class="message-time">${senderName} · ${time}</div>
        </div>
      `;
    }).join('');
    // auto-scroll to bottom
    container.scrollTop = container.scrollHeight;
  }

  // helper to escape HTML
  function escapeHtml(str) {
    if (!str) return "";
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
      return c;
    });
  }

  // ---------- Auth state handler ----------
  onAuthStateChanged(auth, async (user) => {
    if (user) {
      currentUser = user;
      await registerUserInFirestore(user);
      renderMessengerUI();
    } else {
      currentUser = null;
      currentChatPartner = null;
      if (messagesUnsubscribe) messagesUnsubscribe();
      if (usersUnsubscribe) usersUnsubscribe();
      renderLogin();
    }
  });
</script>
</body>
</html>
