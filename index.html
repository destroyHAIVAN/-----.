<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-analytics.js";
import {
    getAuth,
    GoogleAuthProvider,
    signInWithPopup,
    signOut,
    onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
    getFirestore,
    collection,
    addDoc,
    serverTimestamp,
    query,
    orderBy,
    onSnapshot,
    updateDoc,
    doc,
    increment
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "braces-3b27a.firebaseapp.com",
    projectId: "braces-3b27a",
    storageBucket: "braces-3b27a.firebasestorage.app",
    messagingSenderId: "89144591989",
    appId: "1:89144591989:web:e3f02adb8b3cdb3c0dda3c",
    measurementId: "G-1ZSFNF22DG"
};

// Инициализация Firebase
const app = initializeApp(firebaseConfig);
const analytics = getAnalytics(app);
const db = getFirestore(app);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

// DOM элементы
const loginBtn = document.getElementById('loginBtn');
const logoutBtn = document.getElementById('logoutBtn');
const unauthBlock = document.getElementById('unauthBlock');
const authBlock = document.getElementById('authBlock');
const messageForm = document.getElementById('messageForm');
const userNameSpan = document.getElementById('userName');
const userPhotoImg = document.getElementById('userPhoto');
const nameInput = document.getElementById('name');
const emailInput = document.getElementById('email');
const contentInput = document.getElementById('content');
const submitBtn = document.getElementById('submitBtn');

// Google Login
loginBtn.onclick = async () => {
    try {
        await signInWithPopup(auth, provider);
    } catch (error) {
        console.error("Ошибка входа:", error);
        alert("Ошибка входа: " + error.message);
    }
};

logoutBtn.onclick = () => signOut(auth);

// Проверка авторизации
onAuthStateChanged(auth, (user) => {
    if (user) {
        unauthBlock.style.display = 'none';
        authBlock.style.display = 'flex';
        messageForm.style.display = 'block';

        userNameSpan.innerText = user.displayName || user.email;
        userPhotoImg.src = user.photoURL || 'https://via.placeholder.com/40';
        nameInput.value = user.displayName || '';
        emailInput.value = user.email || '';
    } else {
        unauthBlock.style.display = 'flex';
        authBlock.style.display = 'none';
        messageForm.style.display = 'none';
    }
});

// Лайки
window.processLike = async (id) => {
    await updateDoc(doc(db, "requests", id), {
        likes: increment(1)
    });
};

// Добавление поста
submitBtn.onclick = async () => {
    const content = contentInput.value.trim();
    const user = auth.currentUser;

    if (!content) return alert("Введите текст");
    if (!user) return alert("Сначала войдите");

    await addDoc(collection(db, "requests"), {
        name: user.displayName,
        email: user.email,
        photo: user.photoURL,
        text: content,
        likes: 0,
        timestamp: serverTimestamp()
    });

    contentInput.value = "";
};

// Загрузка постов
const q = query(collection(db, "requests"), orderBy("timestamp", "desc"));

onSnapshot(q, (snapshot) => {
    const feed = document.getElementById("feed");
    feed.innerHTML = "";

    snapshot.forEach((item) => {
        const data = item.data();

        feed.innerHTML += `
            <div class="post">
                <div class="post-header">
                    <img src="${data.photo}" class="post-avatar">
                    <b>${data.name}</b>
                </div>
                <p>${data.text}</p>
                <button class="like-btn" onclick="processLike('${item.id}')">
                    ❤️ ${data.likes || 0}
                </button>
            </div>
        `;
    });
});
</script>
