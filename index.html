<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Монитор статусов | Supabase Realtime</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">

    <style>
        /* --- твои стили без изменений --- */
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Inter',sans-serif; background:#f5f7fc; min-height:100vh; padding:2rem 1.5rem; }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

<div class="container">

    <div class="header">
        <h1>📊 Монитор статусов</h1>
        <p>Живая лента участников • Realtime</p>

        <!-- 🔐 КНОПКА GOOGLE LOGIN -->
        <button onclick="loginWithGoogle()" style="
            margin-top:15px;
            padding:10px 20px;
            border:none;
            border-radius:30px;
            background:#4285F4;
            color:white;
            font-weight:600;
            cursor:pointer;">
            🔐 Войти через Google
        </button>

        <div id="authStatus" style="margin-top:10px;font-size:12px;color:#555;"></div>
    </div>

    <div id="currentUserIdDisplay"></div>

</div>

<script>
    // ================== SUPABASE ==================
    const SUPABASE_URL = 'https://pxnetnsamdnpullutqqw.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_XktJcwnMKWJPpny2r5Qltg_0XrdB4yO';

    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // теперь пользователь НЕ захардкожен
    let CURRENT_USER_ID = null;

    const currentUserIdDisplay = document.getElementById('currentUserIdDisplay');
    const authStatus = document.getElementById('authStatus');

    // ================== GOOGLE LOGIN ==================
    async function loginWithGoogle() {
        const { error } = await supabaseClient.auth.signInWithOAuth({
            provider: 'google'
        });

        if (error) {
            alert('Ошибка входа: ' + error.message);
        }
    }

    // ================== ПОЛУЧЕНИЕ ПОЛЬЗОВАТЕЛЯ ==================
    async function getUser() {
        const { data: { user } } = await supabaseClient.auth.getUser();

        if (user) {
            CURRENT_USER_ID = user.id;
            currentUserIdDisplay.textContent = "ID: " + user.id.slice(0, 12) + "...";
            authStatus.innerText = "✅ Вы вошли через Google";
        } else {
            authStatus.innerText = "❌ Не авторизован";
        }
    }

    // ================== ИНИЦИАЛИЗАЦИЯ ==================
    document.addEventListener('DOMContentLoaded', async () => {
        await getUser();

        // слушаем изменения логина
        supabaseClient.auth.onAuthStateChange((_event, session) => {
            if (session?.user) {
                CURRENT_USER_ID = session.user.id;
                currentUserIdDisplay.textContent = "ID: " + CURRENT_USER_ID.slice(0, 12) + "...";
                authStatus.innerText = "✅ Вошли через Google";
            } else {
                CURRENT_USER_ID = null;
                authStatus.innerText = "❌ Вышли из аккаунта";
            }
        });
    });

</script>

</body>
</html>
