<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Наш сайт</title>
    <style>
    body { font-family: "Inter", sans-serif; background: #d7f6f6; display: flex; flex-direction: column; align-items: center; padding: 20px; }
    .container { width: 100%; max-width: 500px; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 0 10px rgba(0,0,0,0.5); }
    input { width: 100%; padding: 15px; margin: 0px 0px 0px 0px; border: 1px solid #ddd; border-radius: 12px; box-sizing: border-box; }
    button{background: #007bff; color: white; border: none; padding: 12px; border-radius: 12px; width: 100%; font-weight: 600; cursor: pointer; transition: 0.3s ease-in-out; }
    .list-btn { cursor: pointer; border: none; background: #fff9f9; padding: 15px; margin-top: 15px; border-radius: 12px; width: 100%; max-width: 500px; position: relative; }
    .like-btn { cursor: pointer; border: none; background: #ff9999; padding: 15px; margin-top: 15px; border-radius: 12px; font-size: 14px; transition: 0.2s ease-in-out; }
    </style>
</head>
<body>
    <div class="container">
        <input type="text" id="name" placeholder="Ваше имя">
        <input type="email" id="email" placeholder="Email">
        <button id="mainBtn">Отправить</button>
    </div>
    <div id="feed"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import {
            getFirestore, collection, addDoc, query, orderBy, onSnapshot,
            serverTimestamp, updateDoc, doc, increment
        } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDgUxR0Txafc_qA-rpd5zKn33265IfxclW",
            authDomain: "qazaq-a072e.firebaseapp.com",
            projectId: "qazaq-a072e",
            storageBucket: "qazaq-a072e.firebasestorage.app",
            messagingSenderId: "47025480090",
            appId: "1:47025480090:web:3dd74ff29bc0c149f39a23",
            measurementId: "G-9TE97NMMB9"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.processLike = async (id) => {
            const docRef = doc(db, "requests", id);
            try {
                await updateDoc(docRef, { likes: increment(1) });
            } catch (error) {
                console.error(error);
            }
        };

        document.getElementById("mainBtn").onclick = async () => {
            const btn = document.getElementById("mainBtn");
            btn.disabled = true;
            try {
                await addDoc(collection(db, "requests"), {
                    name: document.getElementById("name").value,
                    email: document.getElementById("email").value,
                    likes: 0,
                    timestamp: serverTimestamp()
                });
                document.getElementById("name").value = "";
                document.getElementById("email").value = "";
            } catch (e) { 
                alert("Ошибка безопасности: Данные отклонены сервером."); 
            }
            btn.disabled = false;
        };

        const q = query(collection(db, "requests"), orderBy("timestamp", "desc"));
        onSnapshot(q, (snapshot) => {
            const feed = document.getElementById("feed");
            feed.innerHTML = "";
            snapshot.forEach((doc) => {
                const data = doc.data();
                feed.innerHTML += `
                    <div class="post">
                        <span class="time">${data.timestamp ? data.timestamp.toDate().toLocaleString() : ""}</span>
                        <b>${data.name}</b>
                        <p style="margin: 5px 0;">${data.email}</p>
                        <button class="like-btn" onclick="processLike('${doc.id}')">
                            ${data.likes} лайков
                        </button>
                    </div>
                `;
            });
        });
    </script>
</body>
</html>
