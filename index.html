<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход через Google</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 24px;
            padding: 48px 40px;
            max-width: 450px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            font-size: 2rem;
            color: #1a1a2e;
            margin-bottom: 12px;
            font-weight: 700;
        }

        .subtitle {
            color: #666;
            margin-bottom: 40px;
            font-size: 0.95rem;
        }

        .google-btn {
            background: white;
            border: 1px solid #e0e0e0;
            padding: 14px 28px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            transition: all 0.3s ease;
            color: #333;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .google-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.15);
            border-color: #4285F4;
        }

        .google-btn:active {
            transform: translateY(0);
        }

        .user-info {
            margin-top: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 16px;
            display: none;
        }

        .user-info.show {
            display: block;
            animation: slideUp 0.4s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            margin-bottom: 16px;
            border: 3px solid #4285F4;
        }

        .user-name {
            font-size: 1.3rem;
            font-weight: 600;
            color: #1a1a2e;
            margin-bottom: 8px;
        }

        .user-email {
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 20px;
        }

        .logout-btn {
            background: #dc3545;
            border: none;
            padding: 10px 24px;
            border-radius: 50px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.9rem;
        }

        .logout-btn:hover {
            background: #c82333;
            transform: scale(0.98);
        }

        .status {
            margin-top: 20px;
            font-size: 0.85rem;
            padding: 8px 16px;
            border-radius: 50px;
            display: inline-block;
        }

        .status.loading {
            background: #fff3cd;
            color: #856404;
        }

        .status.success {
            background: #d4edda;
            color: #155724;
        }

        .status.error {
            background: #f8d7da;
            color: #721c24;
        }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="container">
        <div class="google-icon" style="font-size: 48px; margin-bottom: 20px;">🔐</div>
        <h1>Добро пожаловать</h1>
        <p class="subtitle">Войдите через Google чтобы продолжить</p>
        
        <button class="google-btn" id="googleLoginBtn">
            <svg width="20" height="20" viewBox="0 0 24 24">
                <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
            </svg>
            Войти через Google
        </button>
        
        <div id="authStatus" class="status loading" style="display: none;">⏳ Проверка авторизации...</div>
        
        <div id="userInfo" class="user-info">
            <img id="userAvatar" class="avatar" src="" alt="Avatar">
            <div id="userName" class="user-name"></div>
            <div id="userEmail" class="user-email"></div>
            <button class="logout-btn" id="logoutBtn">Выйти из аккаунта</button>
        </div>
    </div>

    <script>
        // Инициализация Supabase (ваши данные)
        const SUPABASE_URL = 'https://pxnetnsamdnpullutqqw.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_XktJcwnMKWJPpny2r5Qltg_0XrdB4yO';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // DOM элементы
        const googleLoginBtn = document.getElementById('googleLoginBtn');
        const logoutBtn = document.getElementById('logoutBtn');
        const authStatus = document.getElementById('authStatus');
        const userInfoDiv = document.getElementById('userInfo');
        const userAvatar = document.getElementById('userAvatar');
        const userName = document.getElementById('userName');
        const userEmail = document.getElementById('userEmail');

        // Функция обновления UI после входа
        function showUserInfo(user) {
            userAvatar.src = user.user_metadata?.avatar_url || user.user_metadata?.picture || 'https://via.placeholder.com/80';
            userName.textContent = user.user_metadata?.full_name || user.email?.split('@')[0] || 'Пользователь';
            userEmail.textContent = user.email;
            userInfoDiv.classList.add('show');
            googleLoginBtn.style.display = 'none';
            authStatus.style.display = 'none';
        }

        // Функция скрытия UI после выхода
        function hideUserInfo() {
            userInfoDiv.classList.remove('show');
            googleLoginBtn.style.display = 'inline-flex';
            authStatus.style.display = 'none';
        }

        // Обработчик успешного входа
        async function handleLogin(user) {
            console.log('Пользователь вошёл:', user);
            showUserInfo(user);
        }

        // Выход из аккаунта
        async function handleLogout() {
            const { error } = await supabase.auth.signOut();
            if (error) {
                console.error('Ошибка выхода:', error);
                authStatus.textContent = '❌ Ошибка выхода';
                authStatus.className = 'status error';
                authStatus.style.display = 'inline-block';
                setTimeout(() => {
                    authStatus.style.display = 'none';
                }, 3000);
            } else {
                hideUserInfo();
                console.log('Пользователь вышел');
            }
        }

        // Вход через Google (только Google!)
        async function loginWithGoogle() {
            authStatus.textContent = '⏳ Перенаправление на Google...';
            authStatus.className = 'status loading';
            authStatus.style.display = 'inline-block';
            
            const { error } = await supabase.auth.signInWithOAuth({
                provider: 'google',
                options: {
                    redirectTo: window.location.origin + window.location.pathname
                }
            });
            
            if (error) {
                console.error('Ошибка входа:', error);
                authStatus.textContent = '❌ Ошибка входа: ' + error.message;
                authStatus.className = 'status error';
                setTimeout(() => {
                    authStatus.style.display = 'none';
                }, 3000);
            }
        }

        // Проверка текущей сессии при загрузке
        async function checkSession() {
            authStatus.style.display = 'inline-block';
            authStatus.textContent = '⏳ Проверка сессии...';
            authStatus.className = 'status loading';
            
            const { data: { user }, error } = await supabase.auth.getUser();
            
            if (user) {
                await handleLogin(user);
            } else {
                hideUserInfo();
                authStatus.style.display = 'none';
            }
        }

        // Следим за изменениями аутентификации
        supabase.auth.onAuthStateChange(async (event, session) => {
            console.log('Auth event:', event);
            
            if (event === 'SIGNED_IN' && session?.user) {
                await handleLogin(session.user);
            } else if (event === 'SIGNED_OUT') {
                hideUserInfo();
            } else if (event === 'TOKEN_REFRESHED' && session?.user) {
                // Токен обновлён, пользователь остаётся
                if (session.user) {
                    showUserInfo(session.user);
                }
            }
        });

        // Назначение обработчиков
        googleLoginBtn.onclick = loginWithGoogle;
        logoutBtn.onclick = handleLogout;

        // Запуск проверки сессии
        checkSession();
    </script>
</body>
</html>
